# netlify.toml
# Real Estate AI Template — Netlify Configuration
# Current version: v2
# Files: real-estate-template-v2.html, appscript-v1.gs, remix-v2.html

[build]
  publish = "."

# Redirect root to current versioned file
[[redirects]]
  from = "/"
  to   = "/real-estate-template-v2.html"
  status = 200

# Remix route — forwards ?ref= param for attribution tracking
[[redirects]]
  from = "/remix/*"
  to   = "/remix-v2.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
