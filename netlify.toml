# netlify.toml
# Real Estate AI Template — Netlify Configuration
# Current version: v4
# Files: index.html (real-estate-template-v6.html), netlify/functions/chat.js, appscript-v1.gs

[build]
  publish   = "."
  functions = "netlify/functions"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
